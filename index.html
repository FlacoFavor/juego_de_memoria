<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>juego de memoria</title>
<link rel="stylesheet" href="estilos.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#764ba2">
</head>
<body>

<h1>🧠 Memory Game Emojis</h1>

<div class="menu">
<span>Nivel: <b id="level">1</b></span>
<button onclick="startGame(true)">Nuevo Juego</button>
</div>

<div class="stats">
<span>Mov: <b id="moves">0</b></span>
<span>Tiempo: <b id="time">0</b>s</span>
<span>Récord: <b id="record">--</b></span>
</div>

<div id="board" class="board"></div>

<div id="win" class="win">
🎉 ¡Ganaste el nivel!
<br>
<button onclick="nextLevel()">Siguiente Nivel</button>
</div>
<script src="script.js"></script>

</body>

</html>
